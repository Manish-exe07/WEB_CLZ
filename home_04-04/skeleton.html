<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-Commerce</title>
    <link rel="stylesheet" href="makeup.css">
</head>
<body>
    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="logo">SneakerHead</div>
        <div class="cart-container" id="cart-icon">
            <span>🛒 Cart</span>
            <span id="cart-count" class="badge">0</span>
        </div>
    </header>

    <!-- Product Section -->
    <main class="product-container">
        <article class="product-card">
            <div class="img-container">
                 <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80" alt="Red Nike Sneakers" class="product-img">
            </div>
            <div class="product-info">
                <h2 class="product-title">Nike Air Max V2</h2>
                <p class="product-price">$129.99</p>
                <p class="product-desc">Premium cushioning, lightweight support, and a bold red colorway to stand out.</p>
                <button id="add-to-cart-btn" class="buy-btn">Add to Cart</button>
            </div>
        </article>
    </main>

    <script src="brain.js"></script>
</body>
</html>
