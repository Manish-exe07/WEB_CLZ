<!DOCTYPE html>
<html>
<head>
    <title>Colorful Contact Form</title>
</head>
<body style="font-family: Arial; background: linear-gradient(to right, #6dd5fa, #2980b9);">

    <div style="width: 350px; margin: 60px auto; padding: 20px; background-color: white; border-radius: 10px; box-shadow: 0 0 10px gray;">

        <h2 style="text-align: center; color: #09588c;">Contact Form</h2>

        <form>

            <label style="color: #333;"><b>Name:</b></label><br>
            <input type="text" name="name"
                style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #2980b9; border-radius: 5px;"><br>

            <label style="color: #333;"><b>Email:</b></label><br>
            <input type="email" name="email"
                style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #27ae60; border-radius: 5px;"><br>

            <label style="color: #333;"><b>Password:</b></label><br>
            <input type="password" name="password"
                style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #e67e22; border-radius: 5px;"><br>

            <label style="color: #333;"><b>Message:</b></label><br>
            <textarea name="message" rows="4"
                style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #9b59b6; border-radius: 5px;"></textarea><br>

            <input type="submit" value="Submit"
                style="width: 100%; padding: 10px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">

        </form>

    </div>

</body>
</html>
